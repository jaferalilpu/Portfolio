[build]
  publish = "dist"

# Global single-page application routing protection
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Aggressive asset caching for sub-second repeat loads
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security and optimization headers for the main document
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"